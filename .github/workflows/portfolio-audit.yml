name: Portfolio audit helper

on:
  pull_request:
    paths:
      - 'scripts/portfolio_audit.py'
      - 'scripts/check_hub_sync.py'
      - '.github/workflows/portfolio-audit.yml'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run portfolio audit helper
        run: python3 scripts/portfolio_audit.py --root . --format markdown
