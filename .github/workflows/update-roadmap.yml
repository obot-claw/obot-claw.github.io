name: Update Roadmap

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  update-roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate roadmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-roadmap.mjs
      - name: Commit roadmap changes
        run: |
          if git diff --quiet -- roadmap.md; then
            echo "No roadmap changes."
            exit 0
          fi
          git config user.name "obot-claw[bot]"
          git config user.email "obot-claw[bot]@users.noreply.github.com"
          git add roadmap.md
          git commit -m "Update generated roadmap"
          git push
