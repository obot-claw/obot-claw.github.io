name: Update hub data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: update-hub-data-main
  cancel-in-progress: true

jobs:
  update-hub-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check generator
        run: node --check scripts/generate-hub-data.mjs
      - name: Commit roadmap and dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "obot-claw[bot]"
          git config user.email "obot-claw[bot]@users.noreply.github.com"

          # Rebase before generating/committing so issue-triggered runs do not race.
          git fetch origin main
          git rebase origin/main
          node scripts/generate-hub-data.mjs

          if git diff --quiet -- roadmap.md _data/dashboard.json && [ -z "$(git status --porcelain _data/dashboard.json)" ]; then
            echo "No hub data changes."
            exit 0
          fi

          git add roadmap.md _data/dashboard.json
          git commit -m "Update generated roadmap and dashboard data"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed; rebasing and regenerating before retry $attempt."
            git fetch origin main
            git rebase origin/main
            node scripts/generate-hub-data.mjs
            if git diff --quiet -- roadmap.md _data/dashboard.json; then
              echo "Hub data already current after rebase."
              exit 0
            fi
            git add roadmap.md _data/dashboard.json
            git commit --amend -m "Update generated roadmap and dashboard data"
          done
          echo "Failed to push after retries." >&2
          exit 1
