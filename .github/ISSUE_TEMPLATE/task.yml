name: Task
description: Implementation task linked to a parent Requirement
title: "Task: "
labels: ["type:task", "status:planned"]
assignees:
  - obot-claw
body:
  - type: input
    id: parent_requirement
    attributes:
      label: Parent requirement
      description: Link to the parent Requirement issue.
      placeholder: https://github.com/obot-claw/obot-claw.github.io/issues/123
    validations:
      required: true
  - type: input
    id: project
    attributes:
      label: Project
      description: Project label, e.g. P004 or P007. Also apply the matching project:P### label and milestone.
      placeholder: P007
    validations:
      required: true
  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: What this task changes or proves.
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation plan
      description: Concrete checklist for this task.
      value: |
        - [ ]
    validations:
      required: true
  - type: input
    id: linked_pr
    attributes:
      label: Linked PR / code evidence
      description: Required once code has been written. Use a PR link whenever possible.
      placeholder: https://github.com/obot-claw/repo/pull/123
