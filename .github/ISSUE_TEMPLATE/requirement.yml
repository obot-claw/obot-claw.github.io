name: Requirement
description: High-level requirement with linked implementation tasks
type: Requirement
title: "Requirement: "
labels: ["status:planned"]
assignees:
  - obot-claw
body:
  - type: input
    id: project
    attributes:
      label: Project
      description: Project label, e.g. P004 or P007. Also apply the matching project:P### label and milestone.
      placeholder: P007
    validations:
      required: true
  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: High-level overview of the work being done.
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Design
      description: Design constraints, tradeoffs, and ownership boundaries.
    validations:
      required: true
  - type: textarea
    id: implementation_plan
    attributes:
      label: Implementation plan
      description: Link task sub-issues here. Tasks should have assignees, a parent requirement, a milestone, and linked PRs once code exists.
      value: |
        - [ ] https://github.com/obot-claw/<repo>/issues/<number>
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this Requirement can close.
    validations:
      required: true
